- name: pickup-points-modal
  referenceId: PLACEHOLDER
  description: SonarQube scan for pickup-points-modal
  build:
    provider: dkcicd
    pipelines:
      - name: node-ci-v2
        parameters:
          sonarProjectName: pickup-points-modal
          nodeVersion: 20-bookworm
        runtime:
          architecture: amd64
        when:
          - event: pull_request
            source: branch
          - event: push
            source: branch
            regex: main
